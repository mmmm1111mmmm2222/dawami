<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>داوامي</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1a6b4a;
      --primary-light: #e8f5ef;
      --primary-dark: #134f37;
      --accent: #f0a500;
      --bg: #f5f7f6;
      --card: #ffffff;
      --text: #1c2b24;
      --muted: #6b8a7a;
      --border: #d6e4dc;
      --danger: #c0392b;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 20px 16px 16px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.5px; }
    header p  { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }

    /* ── Main layout ── */
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-header {
      background: var(--primary-light);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .card-header .icon { font-size: 1.1rem; }
    .card-header h2 { font-size: 1rem; font-weight: 600; color: var(--primary-dark); }
    .card-body { padding: 16px; }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.8rem; font-weight: 600; color: var(--muted); }

    input, textarea, select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
      direction: rtl;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,107,74,0.12);
      background: #fff;
    }
    textarea { resize: none; height: 72px; }
    select { appearance: none; cursor: pointer; }

    /* ── Button ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover  { background: var(--primary-dark); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--primary-dark);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      transition: transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }
    #toast.show  { transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); }

    /* ── Totals by currency ── */
    #totalsSection { display: flex; flex-direction: column; gap: 8px; }
    .currency-total {
      background: var(--primary-light);
      border-radius: 10px;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .currency-total .cur-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
    }
    .currency-total .cur-flag { font-size: 1.1rem; }
    .currency-total .cur-nums {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .cur-stat { text-align: center; }
    .cur-stat-val  { font-size: 1rem; font-weight: 700; color: var(--primary-dark); }
    .cur-stat-lbl  { font-size: 0.68rem; color: var(--muted); }

    /* ── List ── */
    #list { display: flex; flex-direction: column; gap: 10px; }

    .workday-item {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .workday-date {
      background: var(--primary);
      color: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      text-align: center;
      min-width: 60px;
      line-height: 1.4;
    }
    .workday-details { display: flex; flex-direction: column; gap: 4px; }
    .workday-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .badge {
      background: var(--primary-light);
      color: var(--primary-dark);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-currency {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
    }
    .workday-note {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ── Empty / loading ── */
    .empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .empty .empty-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .loading { display: flex; justify-content: center; padding: 24px; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>🗓️ داوامي</h1>
  <p>سجّل أيام عملك وتابع دخلك</p>
</header>

<main>

  <!-- Add workday form -->
  <div class="card">
    <div class="card-header">
      <span class="icon">➕</span>
      <h2>إضافة يوم عمل</h2>
    </div>
    <div class="card-body">
      <form id="workdayForm">
        <div class="form-grid">

          <div class="form-group">
            <label for="date">التاريخ</label>
            <input type="date" id="date" required />
          </div>

          <div class="form-group">
            <label for="hours">الساعات</label>
            <input type="number" id="hours" min="0" step="0.5" placeholder="٨" required />
          </div>

          <div class="form-group">
            <label for="wage">الأجر</label>
            <input type="number" id="wage" min="0" step="0.01" placeholder="٠.٠٠" required />
          </div>

          <div class="form-group">
            <label for="currency">العملة</label>
            <select id="currency">
              <option value="TRY">🇹🇷 ليرة تركية</option>
              <option value="USD">🇺🇸 دولار أمريكي</option>
              <option value="EUR">🇪🇺 يورو</option>
              <option value="SAR">🇸🇦 ريال سعودي</option>
              <option value="SYP">🇸🇾 ليرة سورية</option>
            </select>
          </div>

          <div class="form-group full">
            <label for="note">ملاحظة (اختياري)</label>
            <textarea id="note" placeholder="أي ملاحظات عن هذا اليوم..."></textarea>
          </div>

        </div>
        <button class="btn btn-primary" type="submit" id="submitBtn">
          <span>💾</span> حفظ يوم العمل
        </button>
      </form>
    </div>
  </div>

  <!-- Totals by currency -->
  <div class="card" id="totalsCard" style="display:none">
    <div class="card-header">
      <span class="icon">📊</span>
      <h2>الإجماليات حسب العملة</h2>
    </div>
    <div class="card-body" style="padding:12px">
      <div id="totalsSection"></div>
    </div>
  </div>

  <!-- Workdays list -->
  <div class="card">
    <div class="card-header">
      <span class="icon">📋</span>
      <h2>سجل أيام العمل</h2>
    </div>
    <div class="card-body" style="padding: 12px;">
      <div id="list">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
  const API = '/workdays';

  const CURRENCIES = {
    TRY: { label: 'ليرة تركية',   flag: '🇹🇷', symbol: 'TRY' },
    USD: { label: 'دولار أمريكي', flag: '🇺🇸', symbol: '$'   },
    EUR: { label: 'يورو',          flag: '🇪🇺', symbol: '€'   },
    SAR: { label: 'ريال سعودي',   flag: '🇸🇦', symbol: 'ر.س' },
    SYP: { label: 'ليرة سورية',   flag: '🇸🇾', symbol: 'ل.س' },
  };

  // Default date to today
  document.getElementById('date').valueAsDate = new Date();

  // ── Toast ──
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'error show' : 'show';
    setTimeout(() => { t.className = ''; }, 2800);
  }

  // ── Load & render ──
  async function loadWorkdays() {
    const list = document.getElementById('list');
    list.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const res = await fetch(API);
      const data = await res.json();
      renderTotals(data);
      renderList(data);
    } catch {
      list.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>تعذّر تحميل البيانات</div>';
    }
  }

  function renderTotals(days) {
    const section = document.getElementById('totalsSection');
    const card    = document.getElementById('totalsCard');
    if (!days.length) { card.style.display = 'none'; return; }

    // Group by currency
    const groups = {};
    days.forEach(d => {
      const cur = d.currency || 'USD';
      if (!groups[cur]) groups[cur] = { hours: 0, wage: 0 };
      groups[cur].hours += d.hours || 0;
      groups[cur].wage  += d.wage  || 0;
    });

    section.innerHTML = Object.entries(groups).map(([cur, totals]) => {
      const info = CURRENCIES[cur] || { label: cur, flag: '💱', symbol: cur };
      return `
        <div class="currency-total">
          <div class="cur-label">
            <span class="cur-flag">${info.flag}</span>
            ${info.label}
          </div>
          <div class="cur-nums">
            <div class="cur-stat">
              <div class="cur-stat-val">${formatNum(totals.hours)}</div>
              <div class="cur-stat-lbl">ساعة</div>
            </div>
            <div class="cur-stat">
              <div class="cur-stat-val">${formatNum(totals.wage)} <small>${info.symbol}</small></div>
              <div class="cur-stat-lbl">إجمالي الأجر</div>
            </div>
          </div>
        </div>`;
    }).join('');

    card.style.display = 'block';
  }

  function renderList(days) {
    const list = document.getElementById('list');
    if (!days.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>لا توجد أيام عمل مسجّلة بعد</div>';
      return;
    }

    list.innerHTML = days.map(d => {
      const [y, m, day] = (d.date || '').split('-');
      const dateLabel = d.date ? `${day || ''}<br/>${m || ''}/${y || ''}` : d.date;
      const cur  = d.currency || 'USD';
      const info = CURRENCIES[cur] || { flag: '💱', symbol: cur, label: cur };
      return `
        <div class="workday-item">
          <div class="workday-date">${dateLabel}</div>
          <div class="workday-details">
            <div class="workday-meta">
              <span class="badge">⏱ ${formatNum(d.hours)} ساعة</span>
              <span class="badge">💰 ${formatNum(d.wage)} ${info.symbol}</span>
              <span class="badge badge-currency">${info.flag} ${info.label}</span>
            </div>
            ${d.note ? `<div class="workday-note">${escapeHtml(d.note)}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function formatNum(n) {
    const num = parseFloat(n) || 0;
    return num % 1 === 0 ? num.toString() : num.toFixed(2);
  }
  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Submit ──
  document.getElementById('workdayForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0 auto"></div>';

    const body = {
      date:     document.getElementById('date').value,
      hours:    parseFloat(document.getElementById('hours').value) || 0,
      wage:     parseFloat(document.getElementById('wage').value)  || 0,
      currency: document.getElementById('currency').value,
      note:     document.getElementById('note').value.trim(),
    };

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error();
      showToast('✅ تم حفظ يوم العمل بنجاح');
      document.getElementById('hours').value = '';
      document.getElementById('wage').value  = '';
      document.getElementById('note').value  = '';
      document.getElementById('date').valueAsDate = new Date();
      loadWorkdays();
    } catch {
      showToast('❌ حدث خطأ، يرجى المحاولة مجدداً', true);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span>💾</span> حفظ يوم العمل';
    }
  });

  loadWorkdays();
</script>
</body>
</html>
