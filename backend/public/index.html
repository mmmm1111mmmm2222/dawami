<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>داوامي</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #1a6b4a;
      --primary-light: #e8f5ef;
      --primary-dark:  #134f37;
      --bg:            #f5f7f6;
      --card:          #ffffff;
      --text:          #1c2b24;
      --muted:         #6b8a7a;
      --border:        #d6e4dc;
      --danger:        #c0392b;
      --danger-light:  #fdecea;
      --radius:        14px;
      --shadow:        0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 20px 16px 16px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p  { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }

    /* ── Layout ── */
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-header {
      background: var(--primary-light);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .card-header .icon { font-size: 1.1rem; }
    .card-header h2   { font-size: 1rem; font-weight: 600; color: var(--primary-dark); flex: 1; }
    .card-body        { padding: 16px; }

    /* ── Form ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.8rem; font-weight: 600; color: var(--muted); }

    input, textarea, select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: #fafafa;
      width: 100%;
      direction: rtl;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,107,74,0.12);
      background: #fff;
    }
    textarea { resize: none; height: 72px; }
    select   { appearance: none; cursor: pointer; }

    /* ── Buttons ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 11px 16px;
      border: none; border-radius: 9px;
      font-size: 0.9rem; font-weight: 700; font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-primary  { background: var(--primary); color: #fff; width: 100%; margin-top: 4px; font-size: 1rem; padding: 13px; }
    .btn-primary:hover:not(:disabled)  { background: var(--primary-dark); }

    .btn-edit     { background: var(--primary-light); color: var(--primary-dark); flex: 1; }
    .btn-edit:hover   { background: #d0ead9; }
    .btn-delete   { background: var(--danger-light); color: var(--danger); flex: 1; }
    .btn-delete:hover { background: #f9d6d2; }
    .btn-cancel   { background: var(--border); color: var(--text); flex: 1; }
    .btn-cancel:hover { background: #c8d9ce; }
    .btn-danger   { background: var(--danger); color: #fff; flex: 1; }
    .btn-danger:hover { background: #a93226; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      padding: 8px 14px;
      font-size: 0.82rem;
    }
    .btn-ghost:hover { background: var(--primary-light); color: var(--primary-dark); border-color: var(--primary); }

    .btn-pdf {
      background: #b91c1c;
      color: #fff;
      padding: 8px 14px;
      font-size: 0.82rem;
      border-radius: 8px;
    }
    .btn-pdf:hover { background: #991b1b; }

    /* ── Filter card ── */
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .filter-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ── Active filter badge ── */
    .filter-active-bar {
      background: var(--primary-light);
      border: 1.5px solid var(--primary);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--primary-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--primary-dark); color: #fff;
      padding: 10px 20px; border-radius: 24px;
      font-size: 0.9rem; font-weight: 600;
      box-shadow: var(--shadow); transition: transform 0.3s ease;
      z-index: 200; white-space: nowrap;
    }
    #toast.show  { transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); }

    /* ── Totals ── */
    #totalsSection { display: flex; flex-direction: column; gap: 8px; }
    .currency-total {
      background: var(--primary-light); border-radius: 10px;
      padding: 11px 14px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .cur-label { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; font-weight: 600; color: var(--muted); }
    .cur-flag  { font-size: 1.1rem; }
    .cur-nums  { display: flex; gap: 14px; align-items: center; }
    .cur-stat-val { font-size: 1rem; font-weight: 700; color: var(--primary-dark); }
    .cur-stat-lbl { font-size: 0.68rem; color: var(--muted); text-align: center; }

    /* ── List ── */
    #list { display: flex; flex-direction: column; gap: 10px; }

    .workday-item {
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 13px 14px;
      animation: slideIn 0.22s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .workday-top  { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: start; }
    .workday-date {
      background: var(--primary); color: #fff;
      border-radius: 8px; padding: 6px 10px;
      font-size: 0.78rem; font-weight: 700;
      text-align: center; min-width: 60px; line-height: 1.4;
    }
    .workday-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .badge {
      background: var(--primary-light); color: var(--primary-dark);
      border-radius: 20px; padding: 2px 10px;
      font-size: 0.78rem; font-weight: 600;
    }
    .badge-currency { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
    .workday-note   { font-size: 0.82rem; color: var(--muted); line-height: 1.4; margin-top: 4px; }
    .workday-actions { display: flex; gap: 8px; margin-top: 8px; }

    /* ── Empty / loading ── */
    .empty { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 0.9rem; }
    .empty .empty-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .loading { display: flex; justify-content: center; padding: 24px; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modals ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 50; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      width: 100%; max-width: 420px;
      animation: modalIn 0.2s ease; overflow: hidden;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-header {
      background: var(--primary-light); padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h3 { font-size: 1rem; font-weight: 700; color: var(--primary-dark); }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.3rem; color: var(--muted); padding: 2px 6px; border-radius: 6px;
    }
    .modal-close:hover { background: var(--border); }
    .modal-body   { padding: 16px; }
    .modal-footer { padding: 0 16px 16px; display: flex; gap: 10px; }

    .confirm-icon { font-size: 2.5rem; text-align: center; margin-bottom: 8px; }
    .confirm-msg  { text-align: center; font-size: 0.95rem; line-height: 1.6; }
    .confirm-msg strong { color: var(--danger); }

    /* ══════════════════════════════
       PRINT / PDF STYLES
       ══════════════════════════════ */
    #printArea { display: none; }

    @media print {
      body > *:not(#printArea) { display: none !important; }
      #printArea {
        display: block !important;
        direction: rtl;
        font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
        color: #111;
        padding: 24px;
      }

      .print-header {
        text-align: center;
        border-bottom: 2px solid #1a6b4a;
        padding-bottom: 12px;
        margin-bottom: 20px;
      }
      .print-header h1 { font-size: 1.5rem; color: #1a6b4a; margin-bottom: 4px; }
      .print-header p  { font-size: 0.85rem; color: #555; }

      .print-section-title {
        font-size: 1rem;
        font-weight: 700;
        color: #1a6b4a;
        margin: 18px 0 8px;
        padding-bottom: 4px;
        border-bottom: 1px solid #d6e4dc;
      }

      /* Totals table */
      .print-totals-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 6px;
      }
      .print-totals-table th,
      .print-totals-table td {
        border: 1px solid #d6e4dc;
        padding: 7px 10px;
        font-size: 0.85rem;
        text-align: right;
      }
      .print-totals-table th {
        background: #e8f5ef;
        font-weight: 700;
        color: #134f37;
      }

      /* Workdays table */
      .print-days-table {
        width: 100%;
        border-collapse: collapse;
      }
      .print-days-table th,
      .print-days-table td {
        border: 1px solid #d6e4dc;
        padding: 6px 10px;
        font-size: 0.82rem;
        text-align: right;
      }
      .print-days-table th {
        background: #e8f5ef;
        font-weight: 700;
        color: #134f37;
      }
      .print-days-table tr:nth-child(even) td { background: #f9fcfb; }

      .print-footer {
        margin-top: 24px;
        text-align: center;
        font-size: 0.75rem;
        color: #888;
        border-top: 1px solid #d6e4dc;
        padding-top: 10px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>🗓️ داوامي</h1>
  <p>سجّل أيام عملك وتابع دخلك</p>
</header>

<main>

  <!-- Add form -->
  <div class="card">
    <div class="card-header">
      <span class="icon">➕</span>
      <h2>إضافة يوم عمل</h2>
    </div>
    <div class="card-body">
      <form id="addForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="date">التاريخ</label>
            <input type="date" id="date" required />
          </div>
          <div class="form-group">
            <label for="hours">الساعات</label>
            <input type="number" id="hours" min="0" step="0.5" placeholder="٨" required />
          </div>
          <div class="form-group">
            <label for="wage">الأجر</label>
            <input type="number" id="wage" min="0" step="0.01" placeholder="٠.٠٠" required />
          </div>
          <div class="form-group">
            <label for="currency">العملة</label>
            <select id="currency">
              <option value="TRY">🇹🇷 ليرة تركية</option>
              <option value="USD">🇺🇸 دولار أمريكي</option>
              <option value="EUR">🇪🇺 يورو</option>
              <option value="SAR">🇸🇦 ريال سعودي</option>
              <option value="SYP">🇸🇾 ليرة سورية</option>
            </select>
          </div>
          <div class="form-group full">
            <label for="note">ملاحظة (اختياري)</label>
            <textarea id="note" placeholder="أي ملاحظات عن هذا اليوم..."></textarea>
          </div>
        </div>
        <button class="btn btn-primary" type="submit" id="submitBtn">
          <span>💾</span> حفظ يوم العمل
        </button>
      </form>
    </div>
  </div>

  <!-- Filters -->
  <div class="card">
    <div class="card-header">
      <span class="icon">🔍</span>
      <h2>تصفية حسب الشهر</h2>
    </div>
    <div class="card-body">
      <div class="filter-row">
        <div class="form-group">
          <label for="filterMonth">الشهر</label>
          <select id="filterMonth">
            <option value="">— كل الشهور —</option>
            <option value="01">يناير</option>
            <option value="02">فبراير</option>
            <option value="03">مارس</option>
            <option value="04">أبريل</option>
            <option value="05">مايو</option>
            <option value="06">يونيو</option>
            <option value="07">يوليو</option>
            <option value="08">أغسطس</option>
            <option value="09">سبتمبر</option>
            <option value="10">أكتوبر</option>
            <option value="11">نوفمبر</option>
            <option value="12">ديسمبر</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filterYear">السنة</label>
          <select id="filterYear">
            <option value="">— كل السنوات —</option>
          </select>
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn btn-ghost" id="clearFilterBtn" onclick="clearFilters()" style="flex:1">
          ✕ مسح التصفية
        </button>
        <button class="btn btn-pdf" id="exportPdfBtn" onclick="exportPDF()">
          📄 تصدير PDF
        </button>
      </div>
      <div id="filterActiveBadge" style="display:none; margin-top:10px">
        <div class="filter-active-bar">
          <span id="filterLabel">—</span>
          <span style="color:var(--primary)">✓ فعّال</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Totals -->
  <div class="card" id="totalsCard" style="display:none">
    <div class="card-header">
      <span class="icon">📊</span>
      <h2 id="totalsTitle">الإجماليات حسب العملة</h2>
    </div>
    <div class="card-body" style="padding:12px">
      <div id="totalsSection"></div>
    </div>
  </div>

  <!-- List -->
  <div class="card">
    <div class="card-header">
      <span class="icon">📋</span>
      <h2 id="listTitle">سجل أيام العمل</h2>
    </div>
    <div class="card-body" style="padding:12px">
      <div id="list">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

</main>

<!-- Edit modal -->
<div class="modal-overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3>✏️ تعديل يوم العمل</h3>
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <div class="modal-body">
      <form id="editForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="eDate">التاريخ</label>
            <input type="date" id="eDate" required />
          </div>
          <div class="form-group">
            <label for="eHours">الساعات</label>
            <input type="number" id="eHours" min="0" step="0.5" required />
          </div>
          <div class="form-group">
            <label for="eWage">الأجر</label>
            <input type="number" id="eWage" min="0" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="eCurrency">العملة</label>
            <select id="eCurrency">
              <option value="TRY">🇹🇷 ليرة تركية</option>
              <option value="USD">🇺🇸 دولار أمريكي</option>
              <option value="EUR">🇪🇺 يورو</option>
              <option value="SAR">🇸🇦 ريال سعودي</option>
              <option value="SYP">🇸🇾 ليرة سورية</option>
            </select>
          </div>
          <div class="form-group full">
            <label for="eNote">ملاحظة (اختياري)</label>
            <textarea id="eNote" placeholder="أي ملاحظات..."></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeEdit()">إلغاء</button>
      <button class="btn btn-primary" id="saveEditBtn" style="margin-top:0" onclick="submitEdit()">
        <span>💾</span> حفظ التعديلات
      </button>
    </div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal-overlay" id="deleteOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3>🗑️ حذف يوم العمل</h3>
      <button class="modal-close" onclick="closeDelete()">✕</button>
    </div>
    <div class="modal-body">
      <div class="confirm-icon">⚠️</div>
      <p class="confirm-msg">
        هل أنت متأكد أنك تريد حذف هذا اليوم؟<br/>
        <strong>لا يمكن التراجع عن هذا الإجراء.</strong>
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeDelete()">إلغاء</button>
      <button class="btn btn-danger" id="confirmDeleteBtn" onclick="submitDelete()">
        🗑️ نعم، احذف
      </button>
    </div>
  </div>
</div>

<!-- Hidden print area -->
<div id="printArea"></div>

<div id="toast"></div>

<script>
  const API = '/workdays';

  const CURRENCIES = {
    TRY: { label: 'ليرة تركية',   flag: '🇹🇷', symbol: 'TRY' },
    USD: { label: 'دولار أمريكي', flag: '🇺🇸', symbol: '$'   },
    EUR: { label: 'يورو',          flag: '🇪🇺', symbol: '€'   },
    SAR: { label: 'ريال سعودي',   flag: '🇸🇦', symbol: 'ر.س' },
    SYP: { label: 'ليرة سورية',   flag: '🇸🇾', symbol: 'ل.س' },
  };

  const MONTHS_AR = ['','يناير','فبراير','مارس','أبريل','مايو','يونيو',
                      'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

  let allDays    = [];
  let editingId  = null;
  let deletingId = null;

  // ── Init ──
  document.getElementById('date').valueAsDate = new Date();
  populateYears();

  function populateYears() {
    const sel  = document.getElementById('filterYear');
    const year = new Date().getFullYear();
    for (let y = year; y >= year - 5; y--) {
      const opt = document.createElement('option');
      opt.value = String(y);
      opt.textContent = String(y);
      sel.appendChild(opt);
    }
    // Default to current month/year
    sel.value = String(year);
    document.getElementById('filterMonth').value =
      String(new Date().getMonth() + 1).padStart(2, '0');
  }

  // ── Filter helpers ──
  function getFilter() {
    return {
      month: document.getElementById('filterMonth').value,
      year:  document.getElementById('filterYear').value,
    };
  }

  function applyFilter(days) {
    const { month, year } = getFilter();
    if (!month && !year) return days;
    return days.filter(d => {
      if (!d.date) return false;
      const [y, m] = d.date.split('-');
      if (year  && y !== year)  return false;
      if (month && m !== month) return false;
      return true;
    });
  }

  function filterLabel() {
    const { month, year } = getFilter();
    if (!month && !year) return null;
    const parts = [];
    if (month) parts.push(MONTHS_AR[parseInt(month, 10)]);
    if (year)  parts.push(year);
    return parts.join(' ');
  }

  function clearFilters() {
    document.getElementById('filterMonth').value = '';
    document.getElementById('filterYear').value  = '';
    updateFilterBadge();
    render(allDays);
  }

  function updateFilterBadge() {
    const label   = filterLabel();
    const badge   = document.getElementById('filterActiveBadge');
    const labelEl = document.getElementById('filterLabel');
    if (label) {
      badge.style.display = 'block';
      labelEl.textContent = 'الفترة: ' + label;
    } else {
      badge.style.display = 'none';
    }
  }

  // Filter change listeners
  ['filterMonth','filterYear'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
      updateFilterBadge();
      render(allDays);
    });
  });

  // ── Toast ──
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'error show' : 'show';
    setTimeout(() => { t.className = ''; }, 2800);
  }

  // ── Helpers ──
  function formatNum(n) {
    const num = parseFloat(n) || 0;
    return num % 1 === 0 ? num.toString() : num.toFixed(2);
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Load ──
  async function loadWorkdays() {
    document.getElementById('list').innerHTML =
      '<div class="loading"><div class="spinner"></div></div>';
    try {
      const res  = await fetch(API);
      allDays    = await res.json();
      updateFilterBadge();
      render(allDays);
    } catch {
      document.getElementById('list').innerHTML =
        '<div class="empty"><div class="empty-icon">⚠️</div>تعذّر تحميل البيانات</div>';
    }
  }

  function render(days) {
    const filtered = applyFilter(days);
    const label    = filterLabel();

    // Update titles
    document.getElementById('listTitle').textContent =
      label ? `أيام العمل — ${label}` : 'سجل أيام العمل';
    document.getElementById('totalsTitle').textContent =
      label ? `إجماليات ${label}` : 'الإجماليات حسب العملة';

    renderTotals(filtered);
    renderList(filtered);
  }

  // ── Totals ──
  function renderTotals(days) {
    const section = document.getElementById('totalsSection');
    const card    = document.getElementById('totalsCard');
    if (!days.length) { card.style.display = 'none'; return; }

    const groups = buildGroups(days);
    section.innerHTML = Object.entries(groups).map(([cur, t]) => {
      const info = CURRENCIES[cur] || { label: cur, flag: '💱', symbol: cur };
      return `
        <div class="currency-total">
          <div class="cur-label">
            <span class="cur-flag">${info.flag}</span>${info.label}
          </div>
          <div class="cur-nums">
            <div class="cur-stat">
              <div class="cur-stat-val">${formatNum(t.hours)}</div>
              <div class="cur-stat-lbl">ساعة</div>
            </div>
            <div class="cur-stat">
              <div class="cur-stat-val">${formatNum(t.wage)} <small>${info.symbol}</small></div>
              <div class="cur-stat-lbl">إجمالي الأجر</div>
            </div>
          </div>
        </div>`;
    }).join('');
    card.style.display = 'block';
  }

  function buildGroups(days) {
    const groups = {};
    days.forEach(d => {
      const cur = d.currency || 'USD';
      if (!groups[cur]) groups[cur] = { hours: 0, wage: 0 };
      groups[cur].hours += d.hours || 0;
      groups[cur].wage  += d.wage  || 0;
    });
    return groups;
  }

  // ── List ──
  function renderList(days) {
    const list = document.getElementById('list');
    if (!days.length) {
      const msg = filterLabel()
        ? 'لا توجد أيام عمل في هذه الفترة'
        : 'لا توجد أيام عمل مسجّلة بعد';
      list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>${msg}</div>`;
      return;
    }
    list.innerHTML = days.map(d => {
      const [y, m, day] = (d.date || '').split('-');
      const dateLabel   = d.date ? `${day || ''}<br/>${m || ''}/${y || ''}` : '';
      const cur         = d.currency || 'USD';
      const info        = CURRENCIES[cur] || { flag: '💱', symbol: cur, label: cur };
      return `
        <div class="workday-item" id="item-${d._id}">
          <div class="workday-top">
            <div class="workday-date">${dateLabel}</div>
            <div>
              <div class="workday-meta">
                <span class="badge">⏱ ${formatNum(d.hours)} ساعة</span>
                <span class="badge">💰 ${formatNum(d.wage)} ${info.symbol}</span>
                <span class="badge badge-currency">${info.flag} ${info.label}</span>
              </div>
              ${d.note ? `<div class="workday-note">${escapeHtml(d.note)}</div>` : ''}
            </div>
          </div>
          <div class="workday-actions">
            <button class="btn btn-edit"   onclick='openEdit(${JSON.stringify(d)})'>✏️ تعديل</button>
            <button class="btn btn-delete" onclick="openDelete('${d._id}')">🗑️ حذف</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── Add form ──
  document.getElementById('addForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0 auto"></div>';
    const body = {
      date:     document.getElementById('date').value,
      hours:    parseFloat(document.getElementById('hours').value) || 0,
      wage:     parseFloat(document.getElementById('wage').value)  || 0,
      currency: document.getElementById('currency').value,
      note:     document.getElementById('note').value.trim(),
    };
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error();
      showToast('✅ تم حفظ يوم العمل بنجاح');
      document.getElementById('hours').value = '';
      document.getElementById('wage').value  = '';
      document.getElementById('note').value  = '';
      document.getElementById('date').valueAsDate = new Date();
      await loadWorkdays();
    } catch {
      showToast('❌ حدث خطأ، يرجى المحاولة مجدداً', true);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span>💾</span> حفظ يوم العمل';
    }
  });

  // ── Edit modal ──
  function openEdit(d) {
    editingId = d._id;
    document.getElementById('eDate').value     = d.date     || '';
    document.getElementById('eHours').value    = d.hours    ?? '';
    document.getElementById('eWage').value     = d.wage     ?? '';
    document.getElementById('eCurrency').value = d.currency || 'USD';
    document.getElementById('eNote').value     = d.note     || '';
    document.getElementById('editOverlay').classList.add('open');
  }
  function closeEdit() {
    document.getElementById('editOverlay').classList.remove('open');
    editingId = null;
  }
  async function submitEdit() {
    if (!editingId) return;
    const btn = document.getElementById('saveEditBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;margin:0 auto"></div>';
    const body = {
      date:     document.getElementById('eDate').value,
      hours:    parseFloat(document.getElementById('eHours').value)    || 0,
      wage:     parseFloat(document.getElementById('eWage').value)     || 0,
      currency: document.getElementById('eCurrency').value,
      note:     document.getElementById('eNote').value.trim(),
    };
    try {
      const res = await fetch(`${API}/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error();
      closeEdit();
      showToast('✅ تم تعديل يوم العمل بنجاح');
      await loadWorkdays();
    } catch {
      showToast('❌ حدث خطأ أثناء التعديل', true);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span>💾</span> حفظ التعديلات';
    }
  }

  // ── Delete modal ──
  function openDelete(id) {
    deletingId = id;
    document.getElementById('deleteOverlay').classList.add('open');
  }
  function closeDelete() {
    document.getElementById('deleteOverlay').classList.remove('open');
    deletingId = null;
  }
  async function submitDelete() {
    if (!deletingId) return;
    const btn = document.getElementById('confirmDeleteBtn');
    btn.disabled = true;
    btn.textContent = '...جارٍ الحذف';
    try {
      const res = await fetch(`${API}/${deletingId}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      closeDelete();
      showToast('🗑️ تم حذف يوم العمل');
      await loadWorkdays();
    } catch {
      showToast('❌ حدث خطأ أثناء الحذف', true);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '🗑️ نعم، احذف';
    }
  }

  // Close modals on overlay click
  document.getElementById('editOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeEdit();
  });
  document.getElementById('deleteOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeDelete();
  });

  // ── PDF Export ──
  function exportPDF() {
    const filtered = applyFilter(allDays);
    const label    = filterLabel() || 'كل الأيام';
    const groups   = buildGroups(filtered);
    const today    = new Date().toLocaleDateString('ar-SA', { year:'numeric', month:'long', day:'numeric' });

    if (!filtered.length) {
      showToast('لا توجد بيانات للتصدير في هذه الفترة', true);
      return;
    }

    // Build totals rows
    const totalsRows = Object.entries(groups).map(([cur, t]) => {
      const info = CURRENCIES[cur] || { label: cur, symbol: cur };
      return `<tr>
        <td>${info.label}</td>
        <td>${info.symbol}</td>
        <td>${formatNum(t.hours)} ساعة</td>
        <td>${formatNum(t.wage)}</td>
      </tr>`;
    }).join('');

    // Build workday rows
    const dayRows = filtered.map(d => {
      const cur  = d.currency || 'USD';
      const info = CURRENCIES[cur] || { label: cur, symbol: cur };
      return `<tr>
        <td>${escapeHtml(d.date || '')}</td>
        <td>${formatNum(d.hours)}</td>
        <td>${formatNum(d.wage)}</td>
        <td>${info.label}</td>
        <td>${escapeHtml(d.note || '—')}</td>
      </tr>`;
    }).join('');

    document.getElementById('printArea').innerHTML = `
      <div class="print-header">
        <h1>داوامي — تقرير أيام العمل</h1>
        <p>الفترة: ${escapeHtml(label)} &nbsp;|&nbsp; تاريخ الطباعة: ${today}</p>
      </div>

      <div class="print-section-title">الإجماليات حسب العملة</div>
      <table class="print-totals-table">
        <thead>
          <tr>
            <th>العملة</th>
            <th>الرمز</th>
            <th>إجمالي الساعات</th>
            <th>إجمالي الأجر</th>
          </tr>
        </thead>
        <tbody>${totalsRows}</tbody>
      </table>

      <div class="print-section-title">تفاصيل أيام العمل (${filtered.length} يوم)</div>
      <table class="print-days-table">
        <thead>
          <tr>
            <th>التاريخ</th>
            <th>الساعات</th>
            <th>الأجر</th>
            <th>العملة</th>
            <th>ملاحظة</th>
          </tr>
        </thead>
        <tbody>${dayRows}</tbody>
      </table>

      <div class="print-footer">
        تم إنشاء هذا التقرير بواسطة تطبيق داوامي — ${today}
      </div>
    `;

    window.print();
  }

  // ── Start ──
  updateFilterBadge();
  loadWorkdays();
</script>
</body>
</html>
