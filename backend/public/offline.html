<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a6b4a" />
  <title>داوامي — غير متصل</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #1a6b4a;
      --primary-dark: #134f37;
      --bg:           #f5f7f6;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(160deg, var(--primary-dark) 0%, var(--primary) 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      direction: rtl;
      text-align: center;
    }

    .icon {
      font-size: 4.5rem;
      margin-bottom: 24px;
      opacity: 0.9;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    p {
      font-size: 1rem;
      opacity: 0.85;
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .brand {
      font-size: 1.1rem;
      font-weight: 700;
      opacity: 0.6;
      margin-top: 40px;
      letter-spacing: 1px;
    }

    button {
      background: rgba(255, 255, 255, 0.2);
      border: 1.5px solid rgba(255, 255, 255, 0.5);
      color: #fff;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="icon">📵</div>
  <h1>لا يوجد اتصال بالإنترنت</h1>
  <p>تحقق من اتصالك بالإنترنت ثم حاول مجدداً. تطبيق داوامي يحتاج إلى الإنترنت للوصول إلى بياناتك.</p>
  <button onclick="window.location.reload()">إعادة المحاولة</button>
  <div class="brand">🗓️ داوامي</div>
</body>
</html>
